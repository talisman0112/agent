# 通义千问（DashScope）模型配置
# API Key：请设置环境变量 DASHSCOPE_API_KEY 或 TONGYI_API_KEY（与 model/model.py 中读取方式一致）

# 对话模型名称（ChatTongyi / DashScope）
chat_model: qwen3-max

# 文本向量模型名称（用于 Chroma 入库与检索）
embedding_model: text-embedding-v3

# RAG 子模型：`rag_strict_grounding: true` 时在主提示词末尾追加强约束尾注（跑 RAGAS faithfulness 时用）；日常建议 false
rag_strict_grounding: false

# --- RAGAS 评估 scripts/eval_ragas.py（RunConfig）；仍超时可再加长时间或减小并发 ---
# ragas_eval_timeout_seconds: 每条样本×每个指标的异步上限（秒）。RAGAS 默认仅 180，faithfulness 内多跳 LLM 常会触发 TimeoutError
ragas_eval_timeout_seconds: 480
# ragas_eval_max_workers: 评估并发；过高易触达 DashScope 限速排队，看起来像超时（可用环境变量 RAGAS_EVAL_MAX_WORKERS 覆盖）
ragas_eval_max_workers: 6

# --- RAG Rerank 配置 ---
# rerank_enabled: 是否启用 Rerank 精排
rerank_enabled: true
# rerank_model: 模型名称，qwen3-rerank(推荐), gte-rerank-v2
rerank_model: qwen3-rerank
# rerank_top_n: 精排后保留的文档数量
rerank_top_n: 7
# rerank_search_k: 向量检索召回数量（粗排候选数）
rerank_search_k: 20

# --- 增强版 Rerank 配置（解决评分区分度问题）---
# rerank_enhanced: 是否使用增强版 Rerank（含阈值过滤、指令引导、混合打分）
rerank_enhanced: true
# rerank_score_threshold: 分数阈值（0-1），低于此值的文档会被过滤
rerank_score_threshold: 0.25

# rerank_dedup_threshold: 去重相似度阈值（0-1），超过此值认为是重复文档，默认0.70
# 值越小越严格（更容易判定为重复），建议范围 0.60-0.85
rerank_dedup_threshold: 0.70


# rerank_instruct_mode: 预设 instruct 模式
# 可选: qa(问答), semantic(语义), definition(定义), code(代码), fact(事实), comparison(对比), summary(摘要)
rerank_instruct_mode: qa

# rerank_auto_instruct: 是否自动根据查询类型选择 instruct（推荐开启）
rerank_auto_instruct: true

# rerank_custom_instruct: 自定义 instruct（会覆盖模式和自动选择，高级用户可选）
# 示例1-Q&A: "Given a web search query, retrieve relevant passages that answer the query."
# 示例2-代码: "Given a technical query, retrieve relevant code snippets or documentation."
# rerank_custom_instruct:

# --- 对话模型（ChatTongyi / DashScope）采样与长度；缺省不写则沿用集成默认行为 ---
# temperature: 取值越大输出越发散，越小越趋于确定性
temperature: 0.3
# max_tokens: 单次回复上限（上限以模型服务端为准）
max_tokens: 4096
# top_p:  nucleus sampling，与 Tongyi 的 top_p 字段一致；通常与 temperature 配合调风格
top_p: 0.7

# --- 多路召回（Hybrid RAG）配置 ---
# 同时从 Web 搜索和本地知识库召回，经 Rerank 精排后返回最相关结果

# hybrid_enabled: 是否启用多路召回（当为 true 时，优先使用多路召回工具）
hybrid_enabled: true

# hybrid_web_max_results: Web 搜索返回结果数（建议 3-10）
hybrid_web_max_results: 10

# hybrid_local_k: 本地向量检索召回数（粗排候选数）
hybrid_local_k: 10

# hybrid_rerank_top_n: 多路召回后 Rerank 精排保留的 Top-N
hybrid_rerank_top_n: 5

# hybrid_custom_instruct: 多路召回专用 instruct（可选）
# 用于指导 Reranker 如何处理来自不同源的文档
# 示例: "Retrieve relevant passages from both web search and local documents."
# hybrid_custom_instruct:

# --- Query 扩展：广度（多查询改写）与深度（子问题分解）---
# query_expansion_enabled: 是否用 LLM 生成多条检索 query，合并粗排后统一 Rerank（用户原问仍为 Rerank 主 query）
query_expansion_enabled: false
# query_expansion_variants: LLM 生成的额外检索句式条数（不含原问；总检索条数≈variants+1）
query_expansion_variants: 5
# query_expansion_include_original: 是否始终保留用户原问参与检索（建议 true）
query_expansion_include_original: true
# query_expansion_max_coarse_docs: 多路合并去重后的子块/命中上限，再交给父块展开与 Rerank
query_expansion_max_coarse_docs: 100
# query_expansion_max_workers: 并行向量检索线程数
query_expansion_max_workers: 8

# query_decompose_enabled: 是否启用子问题分解（适合对比、多方面、影响因素等复合问）
query_decompose_enabled: false
# query_decompose_max_subqueries: 分解后的子问题上限（不含自动并入的原问）
query_decompose_max_subqueries: 4
# query_decompose_with_expansion: 每个子问题是否再做多查询改写（延迟更高，默认关）
query_decompose_with_expansion: false
