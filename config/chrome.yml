# Chroma 向量库与知识库入库参数（文件名 chrome.yml 与 utils/config_hander.py 中路径一致）

# Chroma 集合名称
collection_name: agent

# 向量库持久化目录（相对项目根，经 path_pool 解析）
persist_directory: db/chroma

# 检索时返回的最相似片段条数（略大可降低「相关短句被挤出 top-k」导致的漏检）
k: 20

# 原始知识文件所在目录（相对项目根）
database_path: data

# 记录已成功入库文件内容 MD5 的文件路径（用于增量更新，跳过未变化文件）
md5_path: md5.txt

# 参与向量化的文件后缀（小写）
allow_knowledge_file_types:
  - ".txt"
  - ".md"
  - ".pdf"
  - ".docx"
  - ".doc"
  - ".xls"
  - ".xlsx"
  - ".ppt"
  - ".pptx"

# 分块大小（字符量，中文语料常见 300～800；与 embedding / 上下文搭配可调）
chunk_size: 512
# 相邻分块重叠：建议约为 chunk_size 的 10%～20%（或 50～120 字），减轻断句信息丢失、控制冗余
chunk_overlap: 80

# RecursiveCharacterTextSplitter 多级分隔符（由粗到细回退；最后一项 "" 为字符级兜底）
# 仍支持旧键 separator: 单字符串（仅一项）；优先使用本列表
separators:
  - "\n\n"
  - "\n"
  - "。"
  - "！"
  - "？"
  - "；"
  - "，"
  - " "
  - ""

# 2.3 结构化分块：按标题/章节预分段后再做递归切块；chunk 携带 section 等 metadata
structured_chunking_enabled: true
# 为每个最终 chunk 增加「【章节】…」前缀，便于向量化与 Rerank 感知章节语义（仅当该 chunk 有 section 元数据时）
structured_chunk_prepend_section: true

# 2.4 Parent-child：子块写入 Chroma 做向量检索；父块整段写入 SQLite，命中子块后展开为父块再 Rerank/拼 prompt（见 CHUNK_OPTIMIZATION.md）
parent_child_enabled: true
# 父块存储路径（相对项目根）；全量重建索引时可一并删除该文件
parent_store_sqlite: db/parent_store.sqlite

# 入库正文清洗（Loader 之后、结构化分块之前）；不改磁盘源文件，仅影响向量内容与 metadata.ingestion_cleaned
ingestion_clean:
  enabled: true
  unicode_form: NFKC
  max_consecutive_blank_lines: 2
  strip_lines: true
  drop_empty_documents: true
  min_document_chars: 20
  # 阶段 B（可选）：整行匹配的 regex 列表（对 strip 后的行 fullmatch）；默认空，可在语料.preview 调试后再打开
  drop_line_patterns: []
  collapse_duplicate_lines: false
  collapse_duplicate_max_line_len: 80
  collapse_duplicate_min_repeats: 2
  merge_soft_hyphens: false
