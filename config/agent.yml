# ReAct / 工具调用 Agent 的通用参数（当前工程在 import 时会加载本文件；
# 若要在代码中使用，请 from utils.config_hander import agent_config 读取相应键）

# 单次对话 ReAct 最大轮数（防止死循环）；运行时映射为 LangGraph recursion_limit = max_iterations * 2 + 1
max_iterations: 18

# 是否在控制台输出中间推理步骤（便于调试）
verbose: false

# 可选：Agent 在对话中的显示名称（日志或 UI 可用）
display_name: RAG助手

# 可选：工具调用解析失败时是否将错误信息反馈给模型重试（与 LangChain Agent 的 handle_parsing_errors 概念一致）
handle_parsing_errors: true

# ==================== 长对话记忆（Phase 1） ====================

# 最近保留的原始对话轮数（每轮约为 1 条 user + 1 条 assistant）
conversation_recent_turns: 6

# 总轮数超过该值后，开始把更早历史压缩成摘要
conversation_summary_trigger_turns: 12

# 摘要产生后，每新增多少轮再做一次增量摘要
conversation_summary_increment_turns: 4

# 历史消息粗估 token 超过该值时，也会触发摘要
conversation_max_history_tokens_before_summary: 5000

# 单条历史摘要的最大字符数
conversation_summary_max_chars: 1200

# ==================== 长对话记忆 Phase 2：结构化事实 ====================

# 是否在滚动摘要更新时抽取并维护结构化长期记忆
conversation_memory_facts_enabled: true

# 注入模型的结构化记忆文本最大字符数
conversation_memory_facts_max_chars: 800

# ==================== Intent Guard（P0：意图契约注入） ====================

intent_guard:
  enabled: true
  classifier: rule
  inject_contract: true
  post_validate: true
  max_correction_rounds: 1
  strict_numbers: true
  log_decision_trace: true
