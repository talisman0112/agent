# FinSight 检索黄金集 · v1（30 题）
#
# 用法：被 scripts/eval_retrieval_metrics.py 加载，对照 RAG 各档配置评估
# Recall@K / Precision@K / MRR / 平均压缩率 / 延迟 P50P95。
#
# 字段约定：
#   id              : 题号（q01 ~ q30）
#   question        : 输入查询（用户原话，已尽量贴近真实问法）
#   expected_docs   : 应当命中的源文件 basename 列表；命中其中任一即视为相关
#   expected_keywords: 兜底关键词（任一出现即视为命中）；当 source 元数据缺失时使用
#   category        : 题目类别，便于分组统计
#
# 设计原则：
#   - 每个语料文件至少 3 道题，覆盖文件主体内容；
#   - 题目难度梯度：简单（直接复述）→ 中等（跨章节理解）→ 困难（需多文件交叉）；
#   - 题目语气模拟用户口语化提问，包括"是什么"、"怎么算"、"对比"、"列举"等。

