- id: q01
  category: glossary
  question: 什么是市盈率 PE？怎么计算？
  expected_docs:
  - financial_terms.md
  - valuation_methods.md
  expected_keywords:
  - 每股收益
  - 市盈率
  - PE
  reference: 市盈率 PE = 股价 / 每股收益 = 总市值 / 归母净利润。常见口径包括 PE-TTM、PE-LYR、PE-Forward。PE 越低通常意味着估值越便宜。
- id: q02
  category: glossary
  question: ROE 怎么用杜邦分析拆解？
  expected_docs:
  - financial_terms.md
  expected_keywords:
  - 杜邦
  - 销售净利率
  - 资产周转率
  - 权益乘数
  reference: ROE = 归母净利润 / 平均归母净资产。杜邦分析拆解：ROE = 销售净利率 x 资产周转率 x 权益乘数，分别对应赚钱能力、运营效率、财务杠杆。长期 ROE 稳定 > 15% 被视为优质企业。
- id: q03
  category: glossary
  question: 自由现金流 FCF 是什么意思？怎么算？
  expected_docs:
  - financial_terms.md
  expected_keywords:
  - 自由现金流
  - 经营活动现金流
  - 资本支出
  reference: 自由现金流 FCF = 经营活动现金流净额 - 资本支出。代表公司维持现有业务规模后真正可自由支配的现金，是 DCF 估值的核心输入。
- id: q04
  category: glossary
  question: PEG 这个指标多少算合理？
  expected_docs:
  - financial_terms.md
  - valuation_methods.md
  expected_keywords:
  - PEG
  - 增长率
  reference: PEG = PE / 净利润增长率。PEG = 1 通常被认为估值合理，< 1 偏低估、> 1 偏高估。适用于成长型公司横向对比，周期股或亏损股不适用。
- id: q05
  category: glossary
  question: 什么是商誉？为什么会引发业绩雷？
  expected_docs:
  - financial_terms.md
  expected_keywords:
  - 商誉
  - 减值
  - 并购
  reference: 商誉是并购溢价部分，期末进行减值测试。若被并购资产业绩不达预期则需计提商誉减值，直接冲减利润，是 A 股周期性业绩雷的重要来源。
- id: q06
  category: glossary
  question: 股息率高的标的一般出现在什么行业？
  expected_docs:
  - financial_terms.md
  expected_keywords:
  - 股息率
  - 公用事业
  - 银行
  reference: 股息率 = 每股股利 / 股价。高股息率标的常见于公用事业、银行、能源、消费等成熟行业。
- id: q07
  category: glossary
  question: A 股、港股、美股的交易制度有哪些差异？
  expected_docs:
  - financial_terms.md
  expected_keywords:
  - T+1
  - 涨跌停
  - 熔断
  reference: A 股：T+1 交收、涨跌停板 +/- 10%（创业板/科创板 +/- 20%）、1 手 = 100 股。港股：T+2 交收、无涨跌停、1 手股数因股票而异。美股：T+1 交收、无涨跌停但有熔断、1 股起买。
- id: q08
  category: valuation
  question: DCF 估值有哪些核心假设？
  expected_docs:
  - valuation_methods.md
  expected_keywords:
  - WACC
  - 永续
  - 自由现金流
  reference: DCF 核心假设：WACC = E/(D+E) x Re + D/(D+E) x Rd x (1-t)；永续增长率 g 通常 <= 长期 GDP 增速（中国 2-3%）；再投资率与 ROIC。
- id: q09
  category: valuation
  question: EV/EBITDA 适合什么样的行业？
  expected_docs:
  - valuation_methods.md
  expected_keywords:
  - EV
  - EBITDA
  - 资本结构
  reference: EV/EBITDA 适用于跨资本结构横向对比、并购估值、重资产折旧政策差异较大的行业（电信、有线、航运、电力）。优势是剔除融资差异、税率差异、折旧政策差异。
- id: q10
  category: valuation
  question: 银行股一般用什么估值方法？
  expected_docs:
  - valuation_methods.md
  expected_keywords:
  - PB
  - DDM
  - 银行
  reference: 银行股常用 PB + DDM 估值，关键观察口径包括不良率、拨备覆盖率、ROE、净息差。行业惯用估值法对照表中银行列为 PB + DDM。
- id: q11
  category: valuation
  question: 估值时常见的错误有哪些？
  expected_docs:
  - valuation_methods.md
  expected_keywords:
  - 可比公司
  - 永续增长
  - EPS
  reference: 估值常见错误包括：可比公司选错、EPS 口径不一致、永续增长率超过 GDP、WACC 的 beta 用错周期、忽视一次性损益、忽视股权稀释、周期顶部错估。
- id: q12
  category: statements
  question: 合同负债代表什么？为什么是收入领先指标？
  expected_docs:
  - financial_statements.md
  expected_keywords:
  - 合同负债
  - 预收
  - 收入
  reference: 合同负债是已收钱但尚未履约的部分。合同负债余额是收入的领先指标，余额持续增长通常意味着未来 1-2 季度收入加速。
- id: q13
  category: statements
  question: 现金流量表里的 CFO、CFI、CFF 分别是什么？
  expected_docs:
  - financial_statements.md
  expected_keywords:
  - 经营活动
  - 投资活动
  - 筹资活动
  reference: CFO 经营活动现金流。CFI 投资活动现金流，包含 CAPEX。CFF 筹资活动现金流。CFO 长期 >= 净利润验证利润含金量。CFF 长期为正而 CFO 长期为负说明公司主要靠融资输血。
- id: q14
  category: statements
  question: 扣非归母净利润和归母净利润有什么区别？
  expected_docs:
  - financial_statements.md
  expected_keywords:
  - 扣非
  - 非经常性
  - 政府补助
  reference: 扣非归母净利润 = 归母净利润 - 非经常性损益（政府补助、资产处置、公允价值变动等），剔除运气性利润后的真实经营利润。
- id: q15
  category: statements
  question: 三表勾稽关系是什么意思？怎么验证财务真伪？
  expected_docs:
  - financial_statements.md
  expected_keywords:
  - 勾稽
  - 净利润
  - 现金流
  reference: 三表勾稽关系：净利润经非现金调整与营运资金调整到 CFO；期末货币资金 - 期初货币资金 = 现金净增加额。异常信号：净利润增长但 CFO 持续为负可能为虚增收入。
- id: q16
  category: industry_nev
  question: 新能源车产业链上中下游分别有哪些环节？
  expected_docs:
  - industry_new_energy_vehicle.md
  expected_keywords:
  - 上游
  - 中游
  - 下游
  - 三电
  reference: 上游：锂镍钴资源、石墨/硅基负极原料。中游：动力电池、正负极材料、电解液、隔膜、电机电控。下游：整车制造（造车新势力、传统车企新能源转型）、后市场。
- id: q17
  category: industry_nev
  question: 动力电池主流路线 LFP 和三元有什么区别？
  expected_docs:
  - industry_new_energy_vehicle.md
  expected_keywords:
  - 磷酸铁锂
  - LFP
  - 三元
  - 能量密度
  reference: 三元锂能量密度高、成本高、热稳定性较差。磷酸铁锂能量密度较低但循环寿命长、成本低、安全性好。LFP 在中国市场份额反超三元，2024 年占比超 70%。
- id: q18
  category: industry_nev
  question: 什么是 800V 高电压平台？为什么需要碳化硅 SiC？
  expected_docs:
  - industry_new_energy_vehicle.md
  expected_keywords:
  - 800V
  - SiC
  - 碳化硅
  reference: 800V 高电压平台实现更短充电时间、更小线径、更轻整车。SiC 碳化硅功率器件在 800V 平台上经济性显著。
- id: q19
  category: industry_nev
  question: 新能源车整车厂常用什么估值方法？
  expected_docs:
  - industry_new_energy_vehicle.md
  - valuation_methods.md
  expected_keywords:
  - PS
  - 单车
  - 销量
  reference: 新能源车整车厂常用估值方法包括 PS 销量 x 单车价值、单车净利、PE（盈利稳定后）、销量增速。
- id: q20
  category: industry_semi
  question: 半导体产业链上游有哪些设备和材料？
  expected_docs:
  - industry_semiconductor.md
  expected_keywords:
  - 光刻机
  - EDA
  - 材料
  reference: 上游设备包括光刻机、刻蚀机、薄膜沉积（PVD/CVD/ALD）、离子注入机、CMP、湿法清洗、量测/检测。上游材料包括硅片、光刻胶、电子特气、CMP 耗材、靶材。
- id: q21
  category: industry_semi
  question: IDM 和 Fabless+Foundry 模式有什么区别？
  expected_docs:
  - industry_semiconductor.md
  expected_keywords:
  - IDM
  - Fabless
  - Foundry
  - OSAT
  reference: IDM 从设计、制造到封测一体化（如英特尔、三星）。Fabless + Foundry + OSAT 分工是设计到代工到封测三段分离（如英伟达 + 台积电 + 日月光），是主流模式。
- id: q22
  category: industry_semi
  question: 什么是 CoWoS？跟 AI 算力有什么关系？
  expected_docs:
  - industry_semiconductor.md
  - industry_ai_computing.md
  expected_keywords:
  - CoWoS
  - 先进封装
  - HBM
  reference: CoWoS 是台积电主导的 2.5D 封装平台，AI GPU 与 HBM 集成的核心载体。AI 算力芯片对 CoWoS 与 HBM 的依赖度急剧提升。
- id: q23
  category: industry_semi
  question: 第三代半导体 SiC 和 GaN 主要应用在哪里？
  expected_docs:
  - industry_semiconductor.md
  expected_keywords:
  - SiC
  - GaN
  - 800V
  - 快充
  reference: SiC 用于高压高温高频：新能源车 800V 平台、光伏逆变器、储能。GaN 用于高频、快充电源、毫米波通信。
- id: q24
  category: industry_ai
  question: HBM 是什么？谁是主要供应商？
  expected_docs:
  - industry_ai_computing.md
  expected_keywords:
  - HBM
  - 海力士
  - 三星
  - 美光
  reference: HBM 是紧贴 GPU 堆叠的 DRAM，解决 GPU 喂料瓶颈。规格演进 HBM2 到 HBM3E 到 HBM4。主要供应商：SK 海力士、三星、美光。通过 CoWoS 先进封装与 GPU 集成。
- id: q25
  category: industry_ai
  question: AI 算力训练和推理有什么区别？
  expected_docs:
  - industry_ai_computing.md
  expected_keywords:
  - 训练
  - 推理
  - GPU
  reference: 训练：参数规模 x 训练 token 数 x 单步浮点开销，万亿参数级模型训练所需算力极高。推理：随用户规模线性增长，长文本、多模态显著提高算力消耗。
- id: q26
  category: industry_ai
  question: 测试时计算 test-time compute 是什么？为什么会拉动推理算力？
  expected_docs:
  - industry_ai_computing.md
  - sample_research_report_ai_computing.md
  expected_keywords:
  - 测试时计算
  - 推理
  reference: 测试时计算指推理模型在推理阶段消耗大量算力，重塑推理芯片需求结构。
- id: q27
  category: industry_ai
  question: 数据中心液冷渗透率为什么快速提升？
  expected_docs:
  - industry_ai_computing.md
  - sample_research_report_ai_computing.md
  expected_keywords:
  - 液冷
  - 机柜
  - 功率密度
  reference: AI 算力数据中心几乎必须液冷化，2024-2025 年是渗透率跃升期。液冷涉及 CDU、Manifold、快接头、冷却液、冷却塔等。
